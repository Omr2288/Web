<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Archivos Subidos</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 10px; border-bottom: 1px solid #ccc; }
    a { color: blue; }
  </style>
</head>
<body>

  <h1>Archivos Subidos</h1>

  <table>
    <thead>
      <tr>
        <th>Miniatura</th>
        <th>Nombre</th>
        <th>Descargar</th>
        <th>Borrar</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>

 <script>
  async function cargarArchivos() {
    const res = await fetch("/api/files");
    const archivos = await res.json();

    const tbody = document.getElementById("lista");
    tbody.innerHTML = "";

    archivos.forEach(a => {
      const tr = document.createElement("tr");

      const esImagen = /\.(jpg|jpeg|png|gif|webp)$/i.test(a.nombre);

      tr.innerHTML = `
        <td>
          ${esImagen ? `<img src="${a.url}" style="width:60px; height:auto; border-radius:4px;">` : `—`}
        </td>
        <td>${a.nombre}</td>
        <td><a href="${a.url}" download>Descargar</a></td>
        <td><button onclick="borrarArchivo('${a.nombre}')">Borrar</button></td>
      `;

      tbody.appendChild(tr);
    });
  }

  async function borrarArchivo(nombre) {
    if (!confirm("¿Seguro que deseas borrar este archivo?")) return;

    const res = await fetch("/api/files/" + nombre, {
      method: "DELETE"
    });

    const data = await res.json();
    alert(data.message);

    cargarArchivos();
  }

  cargarArchivos();
</script>


</body>
</html>
