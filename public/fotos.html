<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fotos del Proyecto - Tomahawk Services</title>

  <style>
    body { font-family: Arial; padding: 20px; background: #f4f4f4; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .foto-card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .foto-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
    }

    button { padding: 8px 12px; margin-top: 10px; }
  </style>
</head>

<body>

  <h1>Fotos del proyecto</h1>

  <input type="file" id="fotoInput">
  <button onclick="subirFoto()">Subir foto</button>

  <div class="grid" id="galeria"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const proyecto = urlParams.get("proyecto");

    async function cargarFotos() {
      const res = await fetch("/api/fotos/" + proyecto);
      const fotos = await res.json();

      const galeria = document.getElementById("galeria");
      galeria.innerHTML = "";

      fotos.forEach(f => {
        const div = document.createElement("div");
        div.className = "foto-card";

        div.innerHTML = `
          <img src="/uploads/fotos/${f.archivo}">
          <button onclick="eliminar(${f.id})">Eliminar</button>
        `;

        galeria.appendChild(div);
      });
    }

    async function subirFoto() {
      const file = document.getElementById("fotoInput").files[0];
      if (!file) return alert("Selecciona una foto");

      const formData = new FormData();
      formData.append("foto", file);
      formData.append("proyecto_id", proyecto);

      await fetch("/api/fotos", {
        method: "POST",
        body: formData
      });

      cargarFotos();
    }

    async function eliminar(id) {
      if (!confirm("¿Eliminar foto?")) return;

      await fetch("/api/fotos/" + id, { method: "DELETE" });
      cargarFotos();
    }

    cargarFotos();
  </script>

</body>
</html>
