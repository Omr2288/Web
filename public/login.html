<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomahawk Login</title>

  <style>
    :root {
      --verde: #00C853;
      --verde-oscuro: #0A5C3B;
      --dorado: #D4AF37;
      --gris: #555;
      --blanco: #fff;
    }

    body {
      margin: 0;
      background: var(--verde-oscuro);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Animación de entrada */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-box {
      width: 350px;
      background: var(--blanco);
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,0,0,0.3);
      text-align: center;
      animation: fadeIn .6s ease-out;
    }

    .login-box img {
      width: 120px;
      margin-bottom: 15px;
    }

    h2 {
      margin: 0 0 20px;
      color: var(--verde-oscuro);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    .password-box {
      position: relative;
    }

    .toggle-pass {
      position: absolute;
      right: 10px;
      top: 14px;
      cursor: pointer;
      font-size: 14px;
      color: var(--gris);
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--verde);
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      transition: .2s;
    }

    button:hover {
      background: #009e41;
    }

    .error {
      color: red;
      margin-top: 10px;
      font-size: 14px;
      display: none;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: var(--gris);
    }
  </style>
</head>

<body>

  <div class="login-box">
    <img src="/logo.png" alt="Tomahawk Logo">

    <h2>Acceso al Panel</h2>

    <input id="user" type="text" placeholder="Usuario">

    <div class="password-box">
      <input id="pass" type="password" placeholder="Contraseña">
      <span class="toggle-pass" onclick="togglePass()">👁</span>
    </div>

    <button onclick="login()">Entrar</button>

    <div id="error" class="error">Credenciales incorrectas</div>

    <div class="footer">© 2026 Tomahawk Services LLC</div>
  </div>

  <script>
    function togglePass() {
      const pass = document.getElementById("pass");
      pass.type = pass.type === "password" ? "text" : "password";
    }

    async function login() {
      const user = document.getElementById("user").value.trim();
      const pass = document.getElementById("pass").value.trim();
      const error = document.getElementById("error");

      if (!user || !pass) {
        error.textContent = "Completa todos los campos";
        error.style.display = "block";
        return;
      }

      const res = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user, pass })
      });

      const data = await res.json();

      if (data.ok) {
        localStorage.setItem("token", data.token);

        // Animación de salida
        document.querySelector(".login-box").style.opacity = "0";
        setTimeout(() => {
          window.location.href = "/dashboard.html";
        }, 300);

      } else {
        error.textContent = "Usuario o contraseña incorrectos";
        error.style.display = "block";
      }
    }
  </script>

</body>
</html>
